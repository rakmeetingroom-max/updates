<script>
const tabs = document.querySelectorAll('.folder-tab');
const panels = document.querySelectorAll('.panel');
const sheet1 = document.getElementById('sheet-1');
const sheet2 = document.getElementById('sheet-2');
const sheet3 = document.getElementById('sheet-3');

function activateTab(tab){
  tabs.forEach(t => { t.classList.remove('active'); t.setAttribute('aria-selected','false'); });
  panels.forEach(p => p.classList.remove('active'));
  tab.classList.add('active');
  tab.setAttribute('aria-selected','true');
  const panel = document.getElementById(tab.dataset.target);
  if(panel) panel.classList.add('active');

  [sheet1, sheet2, sheet3].forEach(s => s && s.classList.remove('active','purple','blue','violet'));
  if (tab.id === 'tab-1' && sheet1) sheet1.classList.add('active','purple');
  if (tab.id === 'tab-2' && sheet2) sheet2.classList.add('active','blue');
  if (tab.id === 'tab-3' && sheet3) sheet3.classList.add('active','violet');
}
tabs.forEach(tab => tab.addEventListener('click', () => activateTab(tab)));
</script>
